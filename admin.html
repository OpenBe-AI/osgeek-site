<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>OpenBe Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#09090b",
              panel: "#111114",
              line: "rgba(255,255,255,.1)",
              electric: "#3b82f6",
              teal: "#2dd4bf",
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              code: ["Fira Code", "monospace"],
            },
            boxShadow: {
              glow: "0 24px 80px rgba(59, 130, 246, .18)",
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        min-height: 100%;
        background:
          radial-gradient(circle at 18% -10%, rgba(59, 130, 246, 0.22), transparent 28rem),
          radial-gradient(circle at 86% 8%, rgba(45, 212, 191, 0.16), transparent 26rem),
          #09090b;
      }

      .thin-scroll::-webkit-scrollbar {
        height: 8px;
        width: 8px;
      }

      .thin-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 999px;
      }

      .field {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        padding: 0.72rem 0.82rem;
        color: white;
        outline: none;
        transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .field:focus {
        border-color: rgba(45, 212, 191, 0.72);
        box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.12);
        background: rgba(255, 255, 255, 0.075);
      }

      .field::placeholder {
        color: rgba(161, 161, 170, 0.8);
      }

      select.field option {
        background: #111114;
        color: white;
      }

      .active-nav {
        border-color: rgba(45, 212, 191, 0.45);
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.16), rgba(45, 212, 191, 0.1));
        color: white;
      }

      .drawer-open {
        transform: translateX(0) !important;
      }

      .admin-table td {
        vertical-align: middle;
      }
    </style>
  </head>
  <body class="font-sans text-zinc-100 antialiased">
    <div id="toast" class="fixed right-4 top-4 z-[80] hidden max-w-sm rounded-lg border border-white/10 bg-zinc-950 px-4 py-3 text-sm shadow-glow"></div>

    <section id="loginView" class="grid min-h-screen place-items-center px-5 py-10">
      <div class="w-full max-w-md rounded-xl border border-white/10 bg-white/[0.055] p-6 shadow-glow backdrop-blur">
        <div class="mb-8 flex items-center gap-3">
          <div class="grid h-11 w-11 place-items-center rounded-lg border border-teal/40 bg-teal/10 font-code text-sm font-bold text-teal">OB</div>
          <div>
            <h1 class="text-xl font-black tracking-tight">OpenBe Console</h1>
            <p class="text-sm text-zinc-400">运营管理后台</p>
          </div>
        </div>

        <form id="loginForm" class="grid gap-4">
          <label class="grid gap-2 text-sm font-semibold text-zinc-300">
            管理员邮箱
            <input id="loginEmail" class="field" type="email" value="admin@openbe.ai" autocomplete="username" required />
          </label>
          <label class="grid gap-2 text-sm font-semibold text-zinc-300">
            密码
            <input id="loginPassword" class="field" type="password" autocomplete="current-password" required />
          </label>
          <label class="grid gap-2 text-sm font-semibold text-zinc-300">
            API 地址
            <input id="apiBase" class="field font-code text-sm" type="url" value="https://api.osgeek.cn" required />
          </label>
          <button
            class="mt-2 inline-flex h-11 items-center justify-center gap-2 rounded-lg bg-teal px-4 font-bold text-zinc-950 transition hover:bg-cyan-300"
            type="submit"
          >
            <i data-lucide="log-in" class="h-4 w-4"></i>
            登录
          </button>
        </form>
      </div>
    </section>

    <section id="appView" class="hidden min-h-screen">
      <aside class="fixed inset-y-0 left-0 z-40 hidden w-72 border-r border-white/10 bg-zinc-950/78 p-4 backdrop-blur-xl lg:block">
        <div class="mb-7 flex items-center gap-3 px-2">
          <div class="grid h-11 w-11 place-items-center rounded-lg border border-electric/45 bg-electric/10 font-code text-sm font-bold text-teal">OB</div>
          <div>
            <p class="text-lg font-black">OpenBe</p>
            <p class="text-xs font-semibold uppercase tracking-[0.18em] text-zinc-500">Console</p>
          </div>
        </div>

        <nav id="desktopNav" class="grid gap-2"></nav>

        <div class="absolute bottom-4 left-4 right-4 rounded-lg border border-white/10 bg-white/[0.045] p-4">
          <p class="mb-2 text-xs font-semibold uppercase tracking-[0.16em] text-zinc-500">API</p>
          <p id="currentApi" class="break-all font-code text-xs text-zinc-300"></p>
        </div>
      </aside>

      <main class="lg:pl-72">
        <header class="sticky top-0 z-30 border-b border-white/10 bg-zinc-950/72 backdrop-blur-xl">
          <div class="flex min-h-16 flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6">
            <div>
              <p id="sectionEyebrow" class="font-code text-xs font-semibold uppercase tracking-[0.18em] text-teal">Overview</p>
              <h2 id="sectionTitle" class="text-xl font-black sm:text-2xl">概览</h2>
            </div>
            <div class="flex items-center gap-2">
              <button id="refreshBtn" class="inline-flex h-10 items-center gap-2 rounded-lg border border-white/10 bg-white/5 px-3 text-sm font-bold text-zinc-200 transition hover:border-teal/50 hover:text-white">
                <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                刷新
              </button>
              <button id="logoutBtn" class="inline-flex h-10 items-center gap-2 rounded-lg border border-white/10 bg-white/5 px-3 text-sm font-bold text-zinc-200 transition hover:border-red-400/50 hover:text-white">
                <i data-lucide="log-out" class="h-4 w-4"></i>
                退出
              </button>
            </div>
          </div>
          <div id="mobileNav" class="flex gap-2 overflow-x-auto px-4 pb-3 lg:hidden"></div>
        </header>

        <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6">
          <section id="overviewPanel" class="grid gap-6"></section>
          <section id="usersPanel" class="hidden grid gap-5"></section>
          <section id="usagePanel" class="hidden grid gap-5"></section>
          <section id="subscriptionsPanel" class="hidden grid gap-5"></section>
          <section id="modelsPanel" class="hidden grid gap-5"></section>
          <section id="plansPanel" class="hidden grid gap-5"></section>
        </div>
      </main>
    </section>

    <div id="drawerBackdrop" class="fixed inset-0 z-50 hidden bg-black/55 backdrop-blur-sm"></div>
    <aside id="drawer" class="fixed inset-y-0 right-0 z-[60] w-full max-w-xl translate-x-full border-l border-white/10 bg-zinc-950 shadow-2xl transition-transform duration-200">
      <form id="drawerForm" class="flex h-full flex-col">
        <div class="flex items-center justify-between border-b border-white/10 px-5 py-4">
          <div>
            <p id="drawerKicker" class="font-code text-xs font-semibold uppercase tracking-[0.16em] text-teal"></p>
            <h3 id="drawerTitle" class="text-lg font-black"></h3>
          </div>
          <button type="button" id="drawerClose" class="grid h-9 w-9 place-items-center rounded-lg border border-white/10 bg-white/5 transition hover:border-teal/50" aria-label="关闭">
            <i data-lucide="x" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="drawerFields" class="thin-scroll grid flex-1 content-start gap-4 overflow-y-auto p-5"></div>
        <div class="flex items-center justify-between gap-3 border-t border-white/10 p-5">
          <button id="drawerDelete" type="button" class="hidden h-10 items-center gap-2 rounded-lg border border-red-400/30 bg-red-500/10 px-4 text-sm font-bold text-red-200 transition hover:bg-red-500/18">
            <i data-lucide="trash-2" class="h-4 w-4"></i>
            删除
          </button>
          <div class="ml-auto flex gap-2">
            <button type="button" id="drawerCancel" class="h-10 rounded-lg border border-white/10 bg-white/5 px-4 text-sm font-bold text-zinc-200 transition hover:border-white/20">取消</button>
            <button class="h-10 rounded-lg bg-teal px-4 text-sm font-black text-zinc-950 transition hover:bg-cyan-300" type="submit">保存</button>
          </div>
        </div>
      </form>
    </aside>

    <script type="module">
      import {
        BarChart3,
        BadgeCheck,
        CheckCircle2,
        Clock3,
        Cpu,
        CreditCard,
        Copy,
        KeyRound,
        LayoutDashboard,
        LogIn,
        LogOut,
        Plus,
        RefreshCw,
        Smartphone,
        Trash2,
        Users,
        X,
        createIcons,
      } from "lucide";

      const lucide = {
        createIcons: () =>
          createIcons({
            icons: {
              BadgeCheck,
              BarChart3,
              CheckCircle2,
              Clock3,
              Cpu,
              CreditCard,
              Copy,
              KeyRound,
              LayoutDashboard,
              LogIn,
              LogOut,
              Plus,
              RefreshCw,
              Smartphone,
              Trash2,
              Users,
              X,
            },
          }),
      };

      const state = {
        apiBase: localStorage.getItem("openbe.apiBase") || "https://api.osgeek.cn",
        token: localStorage.getItem("openbe.adminToken") || "",
        adminEmail: localStorage.getItem("openbe.adminEmail") || "",
        active: "overview",
        data: {
          users: [],
          phoneUsers: [],
          models: [],
          subscriptions: [],
          plans: [],
          usage: { total: { requests: 0, tokens: 0 }, byUser: {} },
          usageEvents: [],
        },
        filters: {
          users: "",
          phoneUsers: "",
          usageUser: "",
          usageModel: "",
          usageCapability: "",
        },
        phoneProvision: null,
        drawer: null,
      };

      const sections = [
        { id: "overview", label: "概览", icon: "layout-dashboard", kicker: "Overview" },
        { id: "users", label: "用户", icon: "users", kicker: "Users" },
        { id: "usage", label: "用量", icon: "bar-chart-3", kicker: "Usage" },
        { id: "subscriptions", label: "订阅", icon: "badge-check", kicker: "Subscriptions" },
        { id: "models", label: "AI 模型", icon: "cpu", kicker: "Models" },
        { id: "plans", label: "套餐", icon: "credit-card", kicker: "Plans" },
      ];

      const fields = {
        users: [
          { name: "email", label: "邮箱", type: "email", required: true },
          { name: "name", label: "名称" },
          { name: "verified", label: "已验证", type: "checkbox" },
          { name: "password", label: "初始密码", type: "password", required: true, createOnly: true, placeholder: "至少 8 位，建议包含字母和数字" },
        ],
        models: [
          { name: "name", label: "显示名称", required: true },
          { name: "modelId", label: "模型 ID", required: true, code: true },
          { name: "provider", label: "供应商", required: true },
          { name: "baseUrl", label: "Base URL", type: "url", required: true, code: true },
          { name: "apiKey", label: "API Key", type: "password", required: true, code: true },
          { name: "capabilities", label: "能力标签", placeholder: "chat,code,summary,intent" },
          { name: "costPer1kInput", label: "输入成本 / 1K", type: "number" },
          { name: "costPer1kOutput", label: "输出成本 / 1K", type: "number" },
          { name: "sortOrder", label: "排序", type: "number" },
          { name: "isActive", label: "启用", type: "checkbox" },
        ],
        subscriptions: [
          { name: "userId", label: "用户 ID", required: true, code: true },
          { name: "plan", label: "套餐 ID", required: true },
          { name: "status", label: "状态", type: "select", options: ["active", "trialing", "paused", "expired", "canceled"] },
          { name: "monthlyTokenQuota", label: "月 Token 额度", type: "number" },
          { name: "usedTokens", label: "已用 Token", type: "number" },
          { name: "startDate", label: "开始时间", type: "datetime" },
          { name: "endDate", label: "结束时间", type: "datetime" },
          { name: "resetDate", label: "重置时间", type: "datetime" },
        ],
        plans: [
          { name: "name", label: "套餐名称", required: true },
          { name: "planId", label: "套餐 ID", required: true, code: true },
          { name: "group", label: "分组" },
          { name: "price", label: "价格", type: "number" },
          { name: "period", label: "周期" },
          { name: "days", label: "天数", type: "number" },
          { name: "monthlyTokenQuota", label: "月 Token 额度", type: "number" },
          { name: "features", label: "功能说明", type: "textarea" },
          { name: "sortOrder", label: "排序", type: "number" },
          { name: "isActive", label: "启用", type: "checkbox" },
        ],
      };

      const collectionMap = {
        users: "users",
        models: "ai_models",
        subscriptions: "subscriptions",
        plans: "pricing_plans",
      };

      const quotaPresets = [
        { id: "manual_trial", label: "内测额度", quota: 100000, days: 30 },
        { id: "monthly_member", label: "月度会员", quota: 1000000, days: 30 },
        { id: "pro_member", label: "专业会员", quota: 5000000, days: 30 },
      ];

      const $ = (selector) => document.querySelector(selector);
      const escapeHtml = (value = "") =>
        String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      function toast(message, tone = "info") {
        const el = $("#toast");
        el.textContent = message;
        el.className =
          "fixed right-4 top-4 z-[80] max-w-sm rounded-lg border px-4 py-3 text-sm shadow-glow " +
          (tone === "error"
            ? "border-red-400/30 bg-red-950 text-red-100"
            : tone === "success"
              ? "border-teal/30 bg-teal/10 text-teal"
              : "border-white/10 bg-zinc-950 text-zinc-100");
        setTimeout(() => el.classList.add("hidden"), 2800);
      }

      function endpoint(path) {
        return `${state.apiBase.replace(/\/$/, "")}${path}`;
      }

      async function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const response = await fetch(endpoint(path), { ...options, headers });
        const text = await response.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          data = { message: text };
        }
        if (!response.ok) {
          throw new Error(data.message || data.error || `HTTP ${response.status}`);
        }
        return data;
      }

      async function list(collection, params = "") {
        return api(`/api/collections/${collection}/records?${params}`);
      }

      function renderNav() {
        const navHtml = sections
          .map(
            (item) => `
              <button data-section="${item.id}" class="nav-btn flex h-11 items-center gap-3 rounded-lg border border-transparent px-3 text-left text-sm font-bold text-zinc-400 transition hover:border-white/10 hover:bg-white/5 hover:text-white">
                <i data-lucide="${item.icon}" class="h-4 w-4"></i>
                <span>${item.label}</span>
              </button>
            `,
          )
          .join("");
        $("#desktopNav").innerHTML = navHtml;
        $("#mobileNav").innerHTML = sections
          .map(
            (item) => `
              <button data-section="${item.id}" class="nav-btn flex shrink-0 items-center gap-2 rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm font-bold text-zinc-300">
                <i data-lucide="${item.icon}" class="h-4 w-4"></i>
                <span>${item.label}</span>
              </button>
            `,
          )
          .join("");

        document.querySelectorAll(".nav-btn").forEach((btn) => {
          btn.addEventListener("click", () => switchSection(btn.dataset.section));
        });
      }

      function switchSection(id) {
        state.active = id;
        sections.forEach((item) => {
          const panel = $(`#${item.id}Panel`);
          if (panel) panel.classList.toggle("hidden", item.id !== id);
        });
        const meta = sections.find((item) => item.id === id);
        $("#sectionTitle").textContent = meta.label;
        $("#sectionEyebrow").textContent = meta.kicker;
        document.querySelectorAll(".nav-btn").forEach((btn) => {
          btn.classList.toggle("active-nav", btn.dataset.section === id);
        });
        lucide.createIcons();
      }

      function metric(label, value, icon, tone = "teal") {
        const color = tone === "blue" ? "text-electric border-electric/25 bg-electric/10" : "text-teal border-teal/25 bg-teal/10";
        return `
          <div class="rounded-lg border border-white/10 bg-white/[0.045] p-5">
            <div class="mb-5 flex items-center justify-between">
              <span class="text-sm font-semibold text-zinc-400">${label}</span>
              <span class="grid h-9 w-9 place-items-center rounded-lg border ${color}">
                <i data-lucide="${icon}" class="h-4 w-4"></i>
              </span>
            </div>
            <p class="text-3xl font-black">${value}</p>
          </div>
        `;
      }

      function tag(text, tone = "zinc") {
        const colors = {
          teal: "border-teal/25 bg-teal/10 text-teal",
          blue: "border-electric/25 bg-electric/10 text-blue-200",
          red: "border-red-400/25 bg-red-500/10 text-red-200",
          zinc: "border-white/10 bg-white/5 text-zinc-300",
        };
        return `<span class="inline-flex whitespace-nowrap items-center rounded-md border px-2 py-1 text-xs font-bold ${colors[tone]}">${escapeHtml(text)}</span>`;
      }

      function formatNumber(value) {
        return Number(value || 0).toLocaleString();
      }

      function formatDateTime(value) {
        if (!value) return "-";
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString();
      }

      function recordId() {
        const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
        const bytes = new Uint8Array(14);
        crypto.getRandomValues(bytes);
        return `r${Array.from(bytes, (byte) => chars[byte % chars.length]).join("")}`;
      }

      function numericField(source, names) {
        const match = names.find((name) => source && source[name] !== undefined);
        return Number(match ? source[match] : 0) || 0;
      }

      function normalizeUsageItem(item = {}) {
        return {
          requests: numericField(item, ["requests", "request_count", "requestCount", "total_requests", "totalRequests", "count"]),
          tokens: numericField(item, ["tokens", "total_tokens", "totalTokens", "token_count", "tokenCount"]),
          input: numericField(item, ["input", "input_tokens", "inputTokens", "total_input", "totalInput"]),
          output: numericField(item, ["output", "output_tokens", "outputTokens", "total_output", "totalOutput"]),
          lastUsed: item.last_used || item.lastUsed || item.last_used_at || item.lastUsedAt || "",
        };
      }

      function normalizeUsage(raw = {}) {
        const total = normalizeUsageItem(raw.total || raw.summary || raw);
        const byUser = {};
        const source = raw.by_user || raw.byUser || raw.users || [];

        if (Array.isArray(source)) {
          source.forEach((item) => {
            const userId = item.user_id || item.userId || item.id;
            if (userId) byUser[userId] = normalizeUsageItem(item);
          });
        } else {
          Object.entries(source).forEach(([userId, item]) => {
            byUser[userId] = normalizeUsageItem(item);
          });
        }

        return { total, byUser };
      }

      function normalizeUsageEvents(raw = {}) {
        return (raw.items || raw.events || []).map((item) => ({
          id: item.id || `${item.ts}-${item.user_id || item.userId || ""}`,
          ts: item.ts || item.created || "",
          userId: item.user_id || item.userId || "",
          model: item.model || "-",
          capability: item.capability || "-",
          input: numericField(item, ["input", "input_tokens", "inputTokens"]),
          output: numericField(item, ["output", "output_tokens", "outputTokens"]),
          total: numericField(item, ["total", "total_tokens", "totalTokens"]),
        }));
      }

      function usageForUser(userId) {
        return state.data.usage.byUser[userId] || { requests: 0, tokens: 0, input: 0, output: 0, lastUsed: "" };
      }

      function userForUsage(userId) {
        return state.data.users.find((user) => user.id === userId) || null;
      }

      function visibleUsageEvents() {
        return state.data.usageEvents.filter((event) => {
          const user = userForUsage(event.userId);
          return (
            matchesSearch(
              [event.userId, user?.email, user?.name, phoneForUser(user || {}), formatPhone(phoneForUser(user || {}))],
              state.filters.usageUser,
            ) &&
            matchesSearch([event.model], state.filters.usageModel) &&
            matchesSearch([event.capability], state.filters.usageCapability)
          );
        });
      }

      function subscriptionForUser(userId) {
        const subscriptions = state.data.subscriptions
          .filter((item) => item.userId === userId)
          .sort((a, b) => {
            const aActive = a.status === "active" ? 1 : 0;
            const bActive = b.status === "active" ? 1 : 0;
            return bActive - aActive || Number(b.endDate || 0) - Number(a.endDate || 0);
          });
        return subscriptions[0] || null;
      }

      function subscriptionTokenStats(subscription = {}) {
        const used = Number(subscription.usedTokens || 0);
        const total = Number(subscription.monthlyTokenQuota || 0);
        return { used, total, remaining: Math.max(total - used, 0) };
      }

      function subscriptionStatusTag(status) {
        const tone = status === "active" ? "teal" : ["expired", "canceled"].includes(status) ? "red" : "zinc";
        return tag(status || "无订阅", tone);
      }

      function quotaPresetDefaults(presetId, userId = "") {
        const preset = quotaPresets.find((item) => item.id === presetId) || quotaPresets[0];
        const now = Math.floor(Date.now() / 1000);
        const seconds = Number(preset.days || 30) * 24 * 60 * 60;
        return {
          userId,
          status: "active",
          monthlyTokenQuota: preset.quota,
          usedTokens: 0,
          startDate: now,
          endDate: now + seconds,
          resetDate: now + seconds,
          plan: preset.id,
        };
      }

      function manualTrialDefaults(userId) {
        return quotaPresetDefaults("manual_trial", userId);
      }

      function userStatus(user) {
        if (user.verified) {
          return `

            <i data-lucide="clock-3" class="h-3.5 w-3.5"></i>
            待验证
          </span>
        `;

      function phoneForUser(user) {
        const account = state.data.phoneUsers.find((item) => item.userId === user.id || item.email === user.email);
        return account?.phone || "";
      }

      function matchesSearch(values, query) {
        const needle = String(query || "").trim().toLowerCase();
        if (!needle) return true;
        const compactNeedle = needle.replace(/\s+/g, "");
        const plainNeedle = needle.replace(/[^a-z0-9@._-]/g, "");
        return values.some((value) => {
          const text = String(value || "").toLowerCase();
          return (
            text.includes(needle) ||
            text.replace(/\s+/g, "").includes(compactNeedle) ||
            text.replace(/[^a-z0-9@._-]/g, "").includes(plainNeedle)
          );
        });
      }

      function filteredPhoneUsers() {
        return state.data.phoneUsers.filter((item) =>
          matchesSearch([item.phone, formatPhone(item.phone), item.email, item.userId], state.filters.phoneUsers),
        );
      }

      function filteredUsers() {
        return state.data.users.filter((user) =>
          matchesSearch([user.email, user.name, user.id, phoneForUser(user), formatPhone(phoneForUser(user))], state.filters.users),
        );
      }

      function formatPhone(phone = "") {
        const digits = String(phone).replace(/\D/g, "");
        const normalized = digits.startsWith("86") && digits.length === 13 ? digits.slice(2) : digits;
        return normalized.length === 11 ? `${normalized.slice(0, 3)} ${normalized.slice(3, 7)} ${normalized.slice(7)}` : phone || "-";
      }

      }

      function bindActions() {
        document.querySelectorAll("[data-edit]").forEach((btn) => {
          btn.addEventListener("click", () => openDrawer(btn.dataset.edit, btn.dataset.id));
        });
        document.querySelectorAll("[data-new]").forEach((btn) => {
          btn.addEventListener("click", () => openDrawer(btn.dataset.new));
        });
        document.querySelectorAll("[data-open-subscription]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const subscription = subscriptionForUser(btn.dataset.openSubscription);
            if (subscription) {
              openDrawer("subscriptions", subscription.id);
            } else {
              openDrawer("subscriptions", "", manualTrialDefaults(btn.dataset.openSubscription));
            }
          });
        });
        document.querySelectorAll("[data-test-model]").forEach((btn) => {
          btn.addEventListener("click", () => testModel(btn.dataset.testModel));
        });
        document.querySelectorAll("[data-quota-preset]").forEach((btn) => {
          btn.addEventListener("click", () => applyQuotaPreset(btn.dataset.quotaPreset));
        });
        $("#phoneProvisionForm")?.addEventListener("submit", createPhoneUser);
        $("#userSearch")?.addEventListener("input", (event) => {
          state.filters.users = event.currentTarget.value;
          refreshUsersPanel("userSearch");
        });
        $("#phoneUserSearch")?.addEventListener("input", (event) => {
          state.filters.phoneUsers = event.currentTarget.value;
          refreshUsersPanel("phoneUserSearch");
        });
        $("#usageUserSearch")?.addEventListener("input", (event) => {
          state.filters.usageUser = event.currentTarget.value;
          refreshUsagePanel("usageUserSearch");
        });
        $("#usageModelSearch")?.addEventListener("input", (event) => {
          state.filters.usageModel = event.currentTarget.value;
          refreshUsagePanel("usageModelSearch");
        });
        $("#usageCapabilitySearch")?.addEventListener("input", (event) => {
          state.filters.usageCapability = event.currentTarget.value;
          refreshUsagePanel("usageCapabilitySearch");
        });
        $("#reloadUsageEvents")?.addEventListener("click", () => loadUsageEvents().then(() => refreshUsagePanel()).catch((error) => toast(error.message, "error")));
        document.querySelectorAll("[data-copy-code]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            await navigator.clipboard.writeText(btn.dataset.copyCode || "");
            toast("验证码已复制", "success");
          });
        });
      }

      function valueForInput(value, field) {
        if (field.type === "datetime") {
          if (!value) return "";
          const date = new Date(Number(value) * 1000);
          return Number.isNaN(date.getTime()) ? "" : date.toISOString().slice(0, 16);
        }
        return value ?? "";
      }

      function valueFromInput(input, field) {
        if (field.type === "checkbox") return input.checked;
        if (field.type === "number") return Number(input.value || 0);
        if (field.type === "datetime") return input.value ? Math.floor(new Date(input.value).getTime() / 1000) : 0;
        return input.value;
      }

      function openDrawer(kind, id = "", defaults = {}) {
        const item = id ? state.data[kind].find((record) => record.id === id) : defaults;
        state.drawer = { kind, id, item: item || {} };
        const labels = { users: "用户", models: "AI 模型", subscriptions: "订阅", plans: "套餐" };
        $("#drawerKicker").textContent = id ? "Edit" : "Create";
        $("#drawerTitle").textContent = `${id ? "编辑" : "新增"}${labels[kind]}`;
        $("#drawerDelete").classList.toggle("hidden", !id);
        $("#drawerDelete").classList.toggle("inline-flex", Boolean(id));
        $("#drawerFields").innerHTML = fields[kind]
          .filter((field) => !(field.createOnly && id))
          .map((field) => renderField(field, item || {}, Boolean(id)))
          .join("");
        if (kind === "subscriptions") {
          $("#drawerFields").insertAdjacentHTML("afterbegin", renderQuotaPresetButtons());
        }
        $("#drawerBackdrop").classList.remove("hidden");
        $("#drawer").classList.remove("translate-x-full");
        $("#drawer").classList.add("drawer-open");
        lucide.createIcons();
        document.querySelectorAll("[data-quota-preset]").forEach((btn) => {
          btn.addEventListener("click", () => applyQuotaPreset(btn.dataset.quotaPreset));
        });
      }

      function renderQuotaPresetButtons() {
        return `
          <div class="grid gap-3 rounded-lg border border-white/10 bg-white/[0.045] p-4">
            <p class="text-sm font-black text-zinc-200">快捷额度</p>
            <div class="grid gap-2 sm:grid-cols-3">
              ${quotaPresets
                .map(
                  (preset) => `
                    <button type="button" data-quota-preset="${preset.id}" class="rounded-lg border border-white/10 bg-white/5 p-3 text-left transition hover:border-teal/50 hover:bg-teal/10">
                      <p class="text-sm font-black text-white">${escapeHtml(preset.label)}</p>
                      <p class="mt-1 font-code text-xs text-zinc-400">${formatNumber(preset.quota)} tokens / ${preset.days} 天</p>
                    </button>
                  `,
                )
                .join("")}
            </div>
          </div>
        `;
      }

      function applyQuotaPreset(presetId) {
        const form = $("#drawerForm");
        if (!form) return;
        const currentUserId = form.elements.userId?.value || state.drawer?.item?.userId || "";
        const values = quotaPresetDefaults(presetId, currentUserId);
        Object.entries(values).forEach(([key, value]) => {
          const field = fields.subscriptions.find((item) => item.name === key);
          const input = form.elements[key];
          if (!field || !input) return;
          input.value = valueForInput(value, field);
        });
        toast("已填入快捷额度", "success");
      }

      function renderField(field, item, editing) {
        const value = valueForInput(item[field.name], field);
        const required = field.required ? "required" : "";
        const requiredMark = field.required ? '<span class="text-teal">*</span>' : "";
        const inputClass = `field ${field.code ? "font-code text-sm" : ""}`;

        if (field.type === "checkbox") {
          return `
            <label class="flex items-center justify-between gap-4 rounded-lg border border-white/10 bg-white/[0.035] px-4 py-3 text-sm font-semibold text-zinc-300">
              <span>${field.label}</span>
              <input name="${field.name}" type="checkbox" class="h-5 w-5 accent-teal" ${item[field.name] ? "checked" : ""} />
            </label>
          `;
        }

        if (field.type === "textarea") {
          return `
            <label class="grid gap-2 text-sm font-semibold text-zinc-300">
              <span>${field.label} ${requiredMark}</span>
              <textarea name="${field.name}" class="${inputClass} min-h-28" ${required} placeholder="${escapeHtml(field.placeholder || "")}">${escapeHtml(value)}</textarea>
            </label>
          `;
        }

        if (field.type === "select") {
          return `
            <label class="grid gap-2 text-sm font-semibold text-zinc-300">
              <span>${field.label} ${requiredMark}</span>
              <select name="${field.name}" class="${inputClass}" ${required}>
                ${(field.options || []).map((opt) => `<option value="${opt}" ${value === opt ? "selected" : ""}>${opt}</option>`).join("")}
              </select>
            </label>
          `;
        }

        return `
          <label class="grid gap-2 text-sm font-semibold text-zinc-300">
            <span>${field.label} ${requiredMark}</span>
            <input name="${field.name}" class="${inputClass}" type="${field.type || "text"}" value="${escapeHtml(value)}" ${required} placeholder="${escapeHtml(field.placeholder || "")}" ${field.name === "apiKey" && editing ? 'autocomplete="new-password"' : ""} />
          </label>
        `;
      }

      function closeDrawer() {
        state.drawer = null;
        $("#drawerBackdrop").classList.add("hidden");
        $("#drawer").classList.remove("drawer-open");
        $("#drawer").classList.add("translate-x-full");
        $("#drawerForm").reset();
      }

      async function saveDrawer(event) {
        event.preventDefault();
        const { kind, id } = state.drawer;
        const form = new FormData(event.currentTarget);
        const payload = {};

        fields[kind]
          .filter((field) => !(field.createOnly && id))
          .forEach((field) => {
            const input = event.currentTarget.elements[field.name];
            if (!input) return;
            const value = valueFromInput(input, field);
            if (field.name === "password" && !value) return;
            payload[field.name] = value;
          });

        if (kind === "users" && payload.password) {
          payload.passwordConfirm = payload.password;
        }

        try {
          const collection = collectionMap[kind];
          if (id) {
            await api(`/api/collections/${collection}/records/${id}`, {
              method: "PATCH",
              body: JSON.stringify(payload),
            });
          } else {
            payload.id = payload.id || recordId();
            await api(`/api/collections/${collection}/records`, {
              method: "POST",
              body: JSON.stringify(payload),
            });
          }
          toast("保存成功", "success");
          closeDrawer();
          await loadData();
        } catch (error) {
          toast(error.message, "error");
        }
      }

      async function deleteCurrent() {
        const { kind, id } = state.drawer || {};
        if (!id) return;
        if (!confirm("确认删除这条记录？")) return;
        try {
          await api(`/api/collections/${collectionMap[kind]}/records/${id}`, { method: "DELETE" });
          toast("已删除", "success");
          closeDrawer();
          await loadData();
        } catch (error) {
          toast(error.message, "error");
        }
      }

      async function testModel(model) {
        try {
          toast(`正在测试 ${model}...`);
          const result = await api("/v1/chat/completions", {
            method: "POST",
            headers: { Authorization: "Guest admin-console" },
            body: JSON.stringify({
              model,
              messages: [{ role: "user", content: "Reply with OK only." }],
              max_tokens: 16,
              stream: false,
            }),
          });
          const tokens = result.usage?.total_tokens ? `，${result.usage.total_tokens} tokens` : "";
          toast(`模型可用${tokens}`, "success");
        } catch (error) {
          toast(error.message, "error");
        }
      }

      async function createPhoneUser(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        try {
          const result = await api("/v1/admin/phone-users", {
            method: "POST",
            body: JSON.stringify({
              phone: form.get("phone"),
              name: form.get("name"),
              ttlDays: Number(form.get("ttlDays") || 7),
            }),
          });
          state.phoneProvision = result;
          toast("手机号已开通", "success");
          await loadData();
        } catch (error) {
          toast(error.message, "error");
        }
      }

      async function loadUsageEvents() {
        const usageEvents = await api("/v1/admin/usage-events?days=30&limit=200").catch(() => ({ items: [] }));
        state.data.usageEvents = normalizeUsageEvents(usageEvents);
      }

      async function loadData() {
        const [users, phoneUsers, models, subscriptions, plans, usage, usageEvents] = await Promise.all([
          list("users", "page=1&perPage=100&sort=-created"),
          api("/v1/admin/phone-users").catch(() => ({ items: [] })),
          list("ai_models", "page=1&perPage=100&sort=sortOrder,modelId"),
          list("subscriptions", "page=1&perPage=100&sort=-endDate"),
          list("pricing_plans", "page=1&perPage=100&sort=sortOrder,planId"),
          api("/v1/admin/usage").catch(() => ({})),
          api("/v1/admin/usage-events?days=30&limit=200").catch(() => ({ items: [] })),
        ]);
        state.data.users = users.items || [];
        state.data.phoneUsers = phoneUsers.items || [];
        state.data.models = models.items || [];
        state.data.subscriptions = subscriptions.items || [];
        state.data.plans = plans.items || [];
        state.data.usage = normalizeUsage(usage);
        state.data.usageEvents = normalizeUsageEvents(usageEvents);
        renderAll();
      }

      async function login(event) {
        event.preventDefault();
        state.apiBase = $("#apiBase").value.trim().replace(/\/$/, "");
        try {
          const data = await api("/api/collections/_superusers/auth-with-password", {
            method: "POST",
            body: JSON.stringify({
              identity: $("#loginEmail").value.trim(),
              password: $("#loginPassword").value,
            }),
          });
          state.token = data.token;
          state.adminEmail = data.record?.email || $("#loginEmail").value.trim();
          localStorage.setItem("openbe.apiBase", state.apiBase);
          localStorage.setItem("openbe.adminToken", state.token);
          localStorage.setItem("openbe.adminEmail", state.adminEmail);
          showApp();
          await loadData();
          toast("登录成功", "success");
        } catch (error) {
          toast(error.message, "error");
        }
      }

      function logout() {
        state.token = "";
        localStorage.removeItem("openbe.adminToken");
        localStorage.removeItem("openbe.adminEmail");
        $("#loginView").classList.remove("hidden");
        $("#appView").classList.add("hidden");
      }

      function showApp() {
        $("#currentApi").textContent = state.apiBase;
        $("#loginView").classList.add("hidden");
        $("#appView").classList.remove("hidden");
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? "-" : date.toLocaleString("zh-CN", { hour12: false });
      }

      function formatUnix(value) {
        if (!value) return "-";
        const date = new Date(Number(value) * 1000);
        return Number.isNaN(date.getTime()) ? "-" : date.toLocaleDateString("zh-CN");
      }

      function formatUnixTime(value) {
        if (!value) return "-";
        const date = new Date(Number(value) * 1000);
        return Number.isNaN(date.getTime()) ? "-" : date.toLocaleString("zh-CN", { hour12: false });
      }

      $("#loginForm").addEventListener("submit", login);
      $("#logoutBtn").addEventListener("click", logout);
      $("#refreshBtn").addEventListener("click", () => loadData().then(() => toast("已刷新", "success")).catch((error) => toast(error.message, "error")));
      $("#drawerForm").addEventListener("submit", saveDrawer);
      $("#drawerClose").addEventListener("click", closeDrawer);
      $("#drawerCancel").addEventListener("click", closeDrawer);
      $("#drawerBackdrop").addEventListener("click", closeDrawer);
      $("#drawerDelete").addEventListener("click", deleteCurrent);

      renderNav();
      lucide.createIcons();

      if (state.token) {
        $("#apiBase").value = state.apiBase;
        showApp();
        loadData().catch((error) => {
          toast(error.message, "error");
          logout();
        });
      } else {
        $("#apiBase").value = state.apiBase;
      }
    </script>
  </body>
</html>
